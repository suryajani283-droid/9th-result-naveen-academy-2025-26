<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVEEN ACADEMY - Class 9 Result</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="login-card" class="card">
            <img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/img-20251031-wa0016.jpg" alt="School Logo" class="logo">
            <h2>नवीन एकेडमी उच्च माध्यमिक विद्यालय</h2>
            <h3>वार्षिक परीक्षा परिणाम - कक्षा 9</h3>
            <div class="input-group">
                <label>रोल नंबर (Roll Number)</label>
                <input type="text" id="roll-no" placeholder="901">
            </div>
            <div class="input-group">
                <label>जन्म तिथि (Date of Birth)</label>
                <input type="text" id="dob" placeholder="DD-MM-YYYY">
                <small>Format: 17-01-2011</small>
            </div>
            <button id="view-result-btn" onclick="checkResult()">परिणाम देखें</button>
            <p id="error-msg" class="error"></p>
        </div>

        <div id="result-card" class="card hidden">
            <div class="header-result">
                <img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/img-20251031-wa0016.jpg" alt="Logo" class="logo-small">
                <h4>नवीन एकेडमी उच्च माध्यमिक विद्यालय, चौहटन</h4>
            </div>
            <hr>
            <div class="student-info">
                <p><strong>नाम:</strong> <span id="res-name"></span></p>
                <p><strong>पिता का नाम:</strong> <span id="res-father"></span></p>
                <p><strong>रोल नंबर:</strong> <span id="res-roll"></span></p>
            </div>
            <table class="result-table">
                <thead>
                    <tr><th>विषय</th><th>अंक (200 में से)</th></tr>
                </thead>
                <tbody id="marks-body"></tbody>
            </table>
            <div class="summary">
                <p><strong>कुल प्राप्तांक:</strong> <span id="res-total"></span> / 1200</p>
                <p><strong>प्रतिशत:</strong> <span id="res-percentage"></span></p>
                <p><strong>परिणाम:</strong> <span id="res-status"></span></p>
                <p><strong>कक्षा में स्थान:</strong> <span id="res-rank"></span></p>
            </div>
            <button class="btn-back" onclick="goBack()">वापस जाएं</button>
            <button class="btn-print" onclick="window.print()">प्रिंट करें</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
