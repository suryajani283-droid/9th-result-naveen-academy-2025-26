<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naveen Academy | Smart Result Portal 2026</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-navy: #0a192f;
            --accent-blue: #00d2ff;
            --accent-gold: #ffcc00;
            --text-white: #ffffff;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --border-glow: rgba(0, 210, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--primary-navy);
            color: var(--text-white);
            min-height: 100vh;
            position: relative;
        }

        /* --- School Campus Background --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/screenshot_20260320-150922.files-by-google.png') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.12; /* Slight low transparency */
            z-index: -1;
        }

        /* --- Header --- */
        .navbar {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-gold);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-logo { height: 60px; border-radius: 8px; border: 1px solid var(--accent-gold); }
        .nav-text h1 { font-size: 1.4rem; color: var(--accent-gold); font-weight: 800; line-height: 1; }
        .nav-text p { font-size: 0.8rem; color: var(--accent-blue); letter-spacing: 1px; }

        /* --- Main Container --- */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- Director Section --- */
        .director-badge {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--border-glow);
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .director-img {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            object-fit: cover;
            margin-right: 15px;
        }
        .director-info h4 { font-size: 1rem; color: var(--accent-gold); }
        .director-info p { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 600; }

        /* --- Modern Login Card --- */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 450px;
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }
        .nvs-star { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent-gold)); }

        .input-group { text-align: left; margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--accent-blue); font-weight: 700; }
        .input-group input {
            width: 100%; padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; font-size: 1rem;
        }
        .input-group input:focus { border-color: var(--accent-gold); outline: none; }

        .btn-access {
            width: 100%; padding: 18px;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            color: #000; font-weight: 800; border: none;
            border-radius: 12px; cursor: pointer; text-transform: uppercase;
        }
        .btn-access:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); }

        /* --- Gallery Section --- */
        .gallery { display: flex; gap: 20px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
        .gallery-item { border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; }
        .gallery img { height: 180px; width: auto; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.1); }

        /* --- Result View --- */
        .result-container {
            width: 100%; max-width: 900px;
            background: var(--glass-bg);
            border-radius: 30px;
            border: 1px solid var(--border-glow);
            overflow: hidden;
            display: none;
        }
        .result-head { background: #1e293b; padding: 30px; text-align: center; border-bottom: 3px solid var(--accent-gold); }
        .result-head h2 { color: var(--accent-gold); }

        .marks-table { width: 90%; margin: 30px auto; border-collapse: collapse; }
        .marks-table th { padding: 15px; border-bottom: 2px solid var(--accent-blue); text-align: left; color: var(--accent-blue); }
        .marks-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; }

        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 40px 40px; }
        .badge { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .badge span { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .badge h4 { color: var(--accent-gold); font-size: 1.4rem; }

        footer { text-align: center; padding: 40px; color: #475569; font-size: 0.8rem; }

        .hidden { display: none !important; }

        @media print {
            .navbar, .gallery, .director-badge, footer, .btn-row { display: none !important; }
            body::before { display: none; }
            body { background: white; color: black; }
            .result-container { display: block !important; border: 1px solid black; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/img-20251031-wa0016.jpg" class="nav-logo">
            <div class="nav-text">
                <h1>NAVEEN ACADEMY</h1>
                <p>Sr. Sec. School, Chohtan (Barmer)</p>
            </div>
        </div>
        <div style="font-weight: 800; color: var(--accent-gold);">SESSION 2025-26</div>
    </nav>

    <div class="main-content">
        <div class="director-badge" id="dir-badge">
            <img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/img-20250815-wa0008.jpg" class="director-img" alt="Director">
            <div class="director-info">
                <h4>Dr. Jagdish Vishnoi</h4>
                <p>Director & CEO | Maa Vankal Malani Group</p>
            </div>
        </div>

        <div id="login-box" class="login-card">
            <img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/1773751463864.png" class="nvs-star">
            <h2 style="margin-bottom: 30px;">9th 2025-26 Result Portal</h2>
            
            <div class="input-group">
                <label>Roll Number</label>
                <input type="number" id="roll-no" placeholder="Enter Roll Number">
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <input type="text" id="dob" placeholder="DD-MM-YYYY">
            </div>

            <button class="btn-access" onclick="showResult()">View Result</button>
            <p id="err" style="color: #ff4444; margin-top: 15px; font-weight: 700;"></p>
        </div>

        <div id="result-box" class="result-container">
            <div class="result-head">
                <h2>ACADEMIC MARKSHEET 2026</h2>
            </div>
            
            <div style="padding: 20px 40px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between;">
                <div><span>Name:</span> <b id="res-name" style="color: var(--accent-blue);"></b></div>
                <div><span>Roll No:</span> <b id="res-roll" style="color: var(--accent-gold);"></b></div>
            </div>

            <table class="marks-table">
                <thead>
                    <tr><th>Subject</th><th>Max</th><th>Obtained</th></tr>
                </thead>
                <tbody id="marks-body"></tbody>
            </table>

            <div class="badge-grid">
                <div class="badge"><span>Total</span><h4 id="res-total"></h4></div>
                <div class="badge"><span>Percentage</span><h4 id="res-perc"></h4></div>
                <div class="badge"><span>Rank</span><h4 id="res-rank"></h4></div>
            </div>

            <div class="btn-row" style="padding: 30px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
                <button onclick="location.reload()" style="padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-right: 10px;">Back</button>
                <button onclick="window.print()" style="padding: 12px 25px; background: var(--accent-blue); border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">Print PDF</button>
            </div>
        </div>

        <div id="gallery-box" class="gallery">
            <div class="gallery-item"><img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/ram_5599.jpg"></div>
            <div class="gallery-item"><img src="https://suryajani28-cejdx.wordpress.com/wp-content/uploads/2026/03/mpc_4703.jpg"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Naveen Academy | Powered by Suresh Jyani
    </footer>

    <script>
        let data = [];
        async function load() {
            try {
                const r = await fetch(`results.json?v=${Date.now()}`);
                const json = await r.json();
                data = json.map(s => {
                    const t = parseInt(s.hindi)+parseInt(s.english)+parseInt(s.sanskrit)+parseInt(s.math)+parseInt(s.science)+parseInt(s.social_science);
                    return { ...s, total: t, perc: (t/1200*100).toFixed(2)+"%" };
                });
                data.sort((a,b)=>b.total-a.total).forEach((s,i)=>s.rank=i+1);
            } catch(e) {}
        }

        function showResult() {
            const roll = document.getElementById('roll-no').value;
            const dob = document.getElementById('dob').value;
            const s = data.find(x => x.roll_no == roll && x.dob == dob);

            if(s) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dir-badge').style.display = 'none';
                document.getElementById('gallery-box').style.display = 'none';
                document.getElementById('result-box').style.display = 'block';

                document.getElementById('res-name').innerText = s.name;
                document.getElementById('res-roll').innerText = s.roll_no;
                document.getElementById('res-total').innerText = s.total + "/1200";
                document.getElementById('res-perc').innerText = s.perc;
                document.getElementById('res-rank').innerText = "#" + s.rank;

                document.getElementById('marks-body').innerHTML = `
                    <tr><td>Hindi</td><td>200</td><td>${s.hindi}</td></tr>
                    <tr><td>English</td><td>200</td><td>${s.english}</td></tr>
                    <tr><td>Sanskrit</td><td>200</td><td>${s.sanskrit}</td></tr>
                    <tr><td>Maths</td><td>200</td><td>${s.math}</td></tr>
                    <tr><td>Science</td><td>200</td><td>${s.science}</td></tr>
                    <tr><td>S.Science</td><td>200</td><td>${s.social_science}</td></tr>
                `;
            } else {
                document.getElementById('err').innerText = "Incorrect Details!";
            }
        }
        load();
    </script>
</body>
</html>
